<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>服务业区位选址系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand-block">
                <div class="brand-mark"><i class="fas fa-globe-asia"></i></div>
                <div class="brand-copy">
                    <span class="eyebrow">Service industry location selection system</span>
                    <h1>服务业区位选址系统</h1>
                </div>
            </div>

            <div class="toolbar">
                <div class="toolbar-group toolbar-group-compact">
                    <div class="basemap-badge">
                        <i class="fas fa-map"></i>
                        <span>街道地图</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="workspace">
            <section class="map-stage">
                <button id="sidebarOpenBtn" class="sidebar-open-btn" title="展开面板" style="display:none">
                    <i class="fas fa-angles-left"></i>
                </button>
                <div class="map-shell">
                    <div class="map-top-overlay" style="display:none">
                        <div id="systemStatus" class="status-chip"><i class="fas fa-circle-notch fa-spin"></i> 正在初始化项目资源...</div>
                    </div>

                    <div id="map"></div>


                </div>
            </section>

            <aside class="panel" id="sidebarPanel">
                <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="收起面板">
                    <i class="fas fa-angles-right"></i>
                </button>
                <section class="panel-card panel-card-hero">
                    <div class="panel-card-head">
                        <div>
                            <p class="panel-overline">Workspace</p>
                            <h3><i class="fas fa-sparkles"></i> 当前工作台</h3>
                        </div>
                        <span class="badge badge-live">LIVE</span>
                    </div>
                    <div class="quick-chips">
                        <button class="chip chip-tab is-active" data-view="layers"><i class="fas fa-layer-group"></i> 图层管理</button>
                        <button class="chip chip-tab" data-view="scoring"><i class="fas fa-crosshairs"></i> 选址评分</button>
                    </div>
                </section>

                <!-- ========== 图层管理视图 ========== -->
                <div id="viewLayers" class="panel-view panel-view-active">

                <section class="panel-card">
                    <div class="panel-card-head">
                        <div>
                            <p class="panel-overline">Controls</p>
                            <h3><i class="fas fa-fire"></i> 热力图控制</h3>
                        </div>
                    </div>

                    <div class="population-time-block">
                        <div class="control-group control-group-inline population-time-inline">
                            <label>人口时段</label>
                            <span class="fixed-time-label">某周六下午 14:00</span>
                        </div>
                    </div>

                    <div class="range-group">
                        <div class="range-head">
                            <label for="heatRadius">热点范围</label>
                            <span id="heatRadiusValue">25</span>
                        </div>
                        <input type="range" id="heatRadius" min="10" max="50" value="25">
                    </div>

                    <div class="range-group">
                        <div class="range-head">
                            <label for="heatBlur">边缘柔和度</label>
                            <span id="heatBlurValue">18</span>
                        </div>
                        <input type="range" id="heatBlur" min="5" max="40" value="18">
                    </div>

                    <div class="range-group">
                        <div class="range-head">
                            <label for="heatMinOpacity">最小透明度</label>
                            <span id="heatMinOpacityValue">0.35</span>
                        </div>
                        <input type="range" id="heatMinOpacity" min="0" max="1" step="0.01" value="0.35">
                    </div>

                    <div class="stack-actions">
                        <button id="rebuildHeatmap" class="btn btn-primary btn-full"><i class="fas fa-rotate"></i> 重新生成热力图</button>
                        <button id="clearHeatmapBtn" class="btn btn-danger btn-full"><i class="fas fa-trash-alt"></i> 清空热力图</button>
                    </div>
                </section>

                <section class="panel-card">
                    <div class="panel-card-head">
                        <div>
                            <p class="panel-overline">Layers</p>
                            <h3><i class="fas fa-layer-group"></i> 图层</h3>
                        </div>
                        <div class="panel-actions-inline">
                            <button id="expandAllLayers" class="mini-btn" title="全部展开"><i class="fas fa-angles-down"></i></button>
                            <button id="collapseAllLayers" class="mini-btn" title="全部收起"><i class="fas fa-angles-up"></i></button>
                        </div>
                    </div>

                    <div id="layersList"></div>
                </section>



                </div><!-- /viewLayers -->

                <!-- ========== 选址评分视图 ========== -->
                <div id="viewScoring" class="panel-view">

                <section class="panel-card">
                    <div class="panel-card-head">
                        <div>
                            <p class="panel-overline">Location Scoring</p>
                            <h3><i class="fas fa-crosshairs"></i> 选址评分</h3>
                        </div>
                    </div>
                    <p class="scoring-hint" id="scoringHint">点击地图任意位置，选择烘焙店候选点进行评分</p>
                    <div class="stack-actions">
                        <button id="startScoringBtn" class="btn btn-primary btn-full"><i class="fas fa-location-crosshairs"></i> 开始选址</button>
                        <button id="clearScoringBtn" class="btn btn-secondary btn-full" style="display:none"><i class="fas fa-eraser"></i> 清除选址</button>
                    </div>
                </section>

                <section class="panel-card" id="scoringWeightsCard">
                    <div class="panel-card-head">
                        <div>
                            <p class="panel-overline">Weights</p>
                            <h3><i class="fas fa-sliders"></i> 维度权重</h3>
                        </div>
                    </div>

                    <div class="range-group">
                        <div class="range-head">
                            <label for="weightTransport">交通便利度</label>
                            <span id="weightTransportValue">25</span>
                        </div>
                        <input type="range" id="weightTransport" min="0" max="100" value="25" class="scoring-weight-slider">
                    </div>
                    <div class="range-group">
                        <div class="range-head">
                            <label for="weightPopulation">人口密度</label>
                            <span id="weightPopulationValue">25</span>
                        </div>
                        <input type="range" id="weightPopulation" min="0" max="100" value="25" class="scoring-weight-slider">
                    </div>
                    <div class="range-group">
                        <div class="range-head">
                            <label for="weightLandPrice">地价适宜度</label>
                            <span id="weightLandPriceValue">25</span>
                        </div>
                        <input type="range" id="weightLandPrice" min="0" max="100" value="25" class="scoring-weight-slider">
                    </div>
                    <div class="range-group">
                        <div class="range-head">
                            <label for="weightCompetition">竞争压力</label>
                            <span id="weightCompetitionValue">25</span>
                        </div>
                        <input type="range" id="weightCompetition" min="0" max="100" value="25" class="scoring-weight-slider">
                    </div>
                </section>

                <section class="panel-card" id="scoringResultCard" style="display:none">
                    <div class="panel-card-head">
                        <div>
                            <p class="panel-overline">Result</p>
                            <h3><i class="fas fa-chart-pie"></i> 评分结果</h3>
                        </div>
                    </div>
                    <div id="scoringResultContent"></div>
                </section>

                </div><!-- /viewScoring -->
            </aside>
        </main>

        <input type="file" id="kmlFileInput" accept=".kml,.kmz" style="display: none;">
        
        <!-- AI助手 -->
        <div id="aiAssistant" class="ai-assistant" style="display: none;">
            <div class="ai-assistant-header">
                <div class="ai-assistant-title">
                    <i class="fas fa-robot"></i>
                    <span>选址AI助手</span>
                </div>
                <button id="closeAIAssistant" class="ai-assistant-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="ai-assistant-body" id="aiAssistantBody">
                <div class="ai-message">
                    <div class="ai-message-content">
                        <p>您好！我是选址AI助手，您可以向我咨询关于选址的问题，我会基于您的评分结果提供专业建议。</p>
                    </div>
                </div>
            </div>
            <div class="ai-assistant-footer">
                <input type="text" id="aiAssistantInput" class="ai-assistant-input" placeholder="请输入您的问题...">
                <button id="sendAIMessage" class="ai-assistant-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        
        <!-- AI助手按钮 -->
        <button id="aiAssistantBtn" class="ai-assistant-btn" style="display: none;">
            <i class="fas fa-robot"></i>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/tokml@0.4.0/tokml.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="app.js"></script>
</body>
</html>
